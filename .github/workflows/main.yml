name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Necesario para que la acción pueda crear la "Release"
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # Esto automatiza el caché de Gradle
          cache: 'gradle'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci 

      - name: Build Ionic/Angular
        run: npm run build
      - name: Add Android platform
        run: npx cap add android
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Execute Permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare Artifact
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/app-v${{ github.run_number }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/main')
        with:
          tag_name: v0.0.${{ github.run_number }}
          name: Release v0.0.${{ github.run_number }}
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
